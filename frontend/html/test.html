<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test</title>
    <style>
        .card {
            display: flex;
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
        }
        .card img {
            width: 150px;
            margin-right: 15px;
        }
        .info {
            flex: 1;
        }
        .header {
            border: 1px solid black;
            padding: 5px;
            margin-bottom: 10px;
        }
        .descripcion {
            border: 2px solid black;
            border-radius: 20px;
            padding: 10px;
        }
        button { margin-top: 10px; cursor: pointer; padding: 5px 10px; }
        #formulario { display: none; border: 1px solid black; padding: 15px; margin: 10px; }
        input, textarea { display: block; margin: 5px 0 10px 0; width: 100%; }
    </style>




    <!-- PARA WEBSOCKET -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

    <h2>Buscar película</h2>
    <input type="text" id="busqueda" placeholder="Escribe una película...">
    <button onclick="buscar()">Buscar</button>

    <div id="peliculas"></div>

    <div id="formulario">
        <h3>Calificar: <span id="tituloPeli"></span></h3>
        <label>ID Usuario:</label>
        <input type="number" id="idUsuario" value="1">
        <label>Puntaje (1-5):</label>
        <input type="number" id="puntaje" min="1" max="5">
        <label>Comentario:</label>
        <textarea id="comentario" rows="3"></textarea>
        <button onclick="calificar()">Enviar calificación</button>
        <p id="mensaje"></p>
    </div>

   


    <!-- CALIFICACIONES IDEA-->
    <h2>Mis calificaciones</h2>
    <div id="calificaciones"></div>







     <script>
        const socket = new SockJS('http://localhost:8080/ws')
        const stompClient = Stomp.over(socket)

        stompClient.connect({}, function() {
            stompClient.subscribe('/topic/calificaciones', function(mensaje) {
                const calificacion = JSON.parse(mensaje.body)
                const contenedor = document.getElementById('calificaciones')
                contenedor.innerHTML += `
                <div class="card">
                    <img src="${calificacion.contenido.posterUrl}" alt="${calificacion.contenido.titulo}">
                    <div class="info">
                        <div class="header">
                            ${calificacion.contenido.titulo} ${calificacion.contenido.anioEstreno}
                        </div>
                        <div class="descripcion">
                            <p>⭐ Puntaje: ${calificacion.puntaje}/5</p>
                            <p>💬 ${calificacion.comentario}</p>
                        </div>
                    </div>
                </div>
                `
            })
        })
        let peliculaSeleccionada = null
        let misCalificaciones = []


        // Primero carga las calificaciones, luego las películas
        fetch('http://localhost:8080/api/calificaciones/usuario/1')
        .then(res => res.json())
        .then(calificaciones => {
            misCalificaciones = calificaciones
            buscarQuery('inception')
        })
        function buscar() {
            const query = document.getElementById('busqueda').value
            buscarQuery(query)        
        }
        function buscarQuery(query) {
        fetch(`http://localhost:8080/api/catalogo/tmdb?query=${query}`)
        .then(res => res.json())
        .then(peliculas => {
            const contenedor = document.getElementById('peliculas')
            contenedor.innerHTML = ''
            let count = 0
            peliculas.forEach(p => {
                if (p.posterUrl && count < 5) {
                    const calificacion = misCalificaciones.find(c => c.contenido.apiId === p.apiId)
                    const calificacionHTML = calificacion
                        ? `<p>⭐ Tu puntaje: ${calificacion.puntaje}/5</p>
                        <p>💬 ${calificacion.comentario}</p>`
                        : `<button onclick='seleccionar(${JSON.stringify(p)})'>Calificar</button>`

                    contenedor.innerHTML += `
                    <div class="card">
                        <img src="${p.posterUrl}" alt="${p.titulo}">
                        <div class="info">
                            <div class="header">
                                ${p.titulo} ${p.anioEstreno}
                            </div>
                            <div class="descripcion">
                                <p>${p.descripcion || 'Sin descripción'}</p>
                                <span>♡</span>
                                <span>⚡</span>
                            </div>
                            ${calificacionHTML}
                        </div>
                    </div>
                    `
                    count++
                }
            })
        })
    }
        // Carga inicial con inception
        buscarQuery('inception')

        function buscar() {
            const query = document.getElementById('busqueda').value
            buscarQuery(query)
        }

        function buscarQuery(query) {
            fetch(`http://localhost:8080/api/catalogo/tmdb?query=${query}`)
            .then(res => res.json())
            .then(peliculas => {
                const contenedor = document.getElementById('peliculas')
                contenedor.innerHTML = ''
                let count = 0
                peliculas.forEach(p => {
                    if (p.posterUrl && count < 5) {
                        contenedor.innerHTML += `
                        <div class="card">
                            <img src="${p.posterUrl}" alt="${p.titulo}">
                            <div class="info">
                                <div class="header">
                                    ${p.titulo} ${p.anioEstreno}
                                </div>
                                <div class="descripcion">
                                    <p>${p.descripcion || 'Sin descripción'}</p>
                                    <span>♡</span>
                                    <span>⚡</span>
                                </div>
                                <button onclick='seleccionar(${JSON.stringify(p)})'>Calificar</button>
                            </div>
                        </div>
                        `
                        count++
                    }
                })
            })
        }

        function seleccionar(pelicula) {
            peliculaSeleccionada = pelicula
            document.getElementById('tituloPeli').textContent = pelicula.titulo
            document.getElementById('formulario').style.display = 'block'
            document.getElementById('mensaje').textContent = ''
            document.getElementById('formulario').scrollIntoView()
        }

        function calificar() {
            const idUsuario = parseInt(document.getElementById('idUsuario').value)
            const puntaje = parseInt(document.getElementById('puntaje').value)
            const comentario = document.getElementById('comentario').value

            fetch('http://localhost:8080/api/catalogo/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(peliculaSeleccionada)
            })
            .then(res => res.json())
            .then(contenido => {
                return fetch('http://localhost:8080/api/calificaciones', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idUsuario: idUsuario,
                        idContenido: contenido.idContenido,
                        puntaje: puntaje,
                        comentario: comentario
                    })
                })
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById('mensaje').textContent = '✅ Calificación enviada correctamente'
                document.getElementById('formulario').style.display = 'none'
            })
            .catch(() => {
                document.getElementById('mensaje').textContent = '❌ Error al calificar'
            })
        }

        
    fetch('http://localhost:8080/api/calificaciones/usuario/1')
    .then(res => res.json())
    .then(calificaciones => {
        const contenedor = document.getElementById('calificaciones')
        contenedor.innerHTML = '' // Limpiamos antes de rellenar
        
        calificaciones.forEach(c => {
            // CORREGIDO: Validamos que 'contenido' exista antes de pedir sus datos
            const poster = c.contenido?.posterUrl ? c.contenido.posterUrl : 'https://via.placeholder.com/150';
            const titulo = c.contenido?.titulo ? c.contenido.titulo : 'Contenido Desconocido';
            const anio = c.contenido?.anioEstreno ? c.contenido.anioEstreno : '';

            contenedor.innerHTML += `
            <div class="card">
                <img src="${poster}" alt="${titulo}">
                <div class="info">
                    <div class="header">
                        ${titulo} ${anio}
                    </div>
                    <div class="descripcion">
                        <p>⭐ Puntaje: ${c.puntaje}/5</p>
                        <p>💬 ${c.comentario || 'Sin comentario'}</p>
                        <p>📅 ${c.fechaCalificacion ? c.fechaCalificacion.split('T')[0] : ''}</p>
                    </div>
                </div>
            </div>
            `
        })
    })
    .catch(err => console.error("Error al cargar calificaciones:", err))
    </script>
</body>
</html>
