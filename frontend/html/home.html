<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMIEWOOD - Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/home.css">
</head>

<body>
  <div class="wrapper">

    <!-- NAVBAR (diseño nuevo) -->
    <nav class="navbar-homi" aria-label="Navegación principal">
      <a href="../html/home.html" class="brand">
        <img src="../img/homelogo.webp" alt="Homiewood" width="230px">
      </a>
      <div class="nav-links d-none d-md-flex gap-4">
        <a href="#">Trending</a>
        <a href="#">Mis Homies</a>
        <a href="#">Lanzamientos</a>
      </div>
      <div class="nav-icons d-flex gap-1 align-items-center">
        <button type="button" aria-label="Buscar"><i class="bi bi-search"></i></button>
        <button type="button" aria-label="Notificaciones"><i class="bi bi-bell-fill"></i></button>
        <!-- Usuario autenticado (funcionalidad actual) -->
        <span id="navbar-username" style="color:#7a7d88; font-weight:600;"></span>
        <button type="button" class="avatar" onclick="cerrarSesion()" title="Cerrar sesión"
          style="border:none; background:transparent;">
          <img src="../img/hamstericon.png" alt="Perfil" width="30px">
        </button>
      </div>
      <button class="hamburger btn btn-link p-1 text-dark fs-4 d-none" id="menuBtn">☰</button>
    </nav>

    <!-- Mobile drawer -->
    <div class="mobile-drawer" id="drawer">
      <a href="#">Trending</a>
      <a href="#">Mis Homies</a>
      <a href="#">Lanzamientos</a>
    </div>

    <!-- MAIN -->
    <div class="main-row d-flex gap-3 align-items-start">

      <!-- FEED -->
      <div class="flex-grow-1" style="min-width:0">

        <!-- CREAR POST -->
        <div class="composer">

          <p class="mb-2" style="color:#fff066; font-size:0.82rem; font-weight:700;">
            1. Elige una película o serie
          </p>
          <div class="film-search-wrap mb-3" id="filmSearchWrap">
            <input type="text" id="filmSearchInput" placeholder="🎬 Buscar película o serie..." autocomplete="off" />
            <div class="film-dropdown" id="filmDropdown"></div>
          </div>

          <div class="selected-film mb-3" id="selectedFilm">
            <div class="mini-cover" id="selectedCover"></div>
            <div class="flex-grow-1">
              <div id="selectedTitle" style="color:#fff; font-size:0.92rem;"></div>
              <div id="selectedMeta" style="color:#fff066; font-size:0.75rem;"></div>
              <div class="chip-tags" id="selectedTags"></div>
            </div>
            <button class="remove-film" id="removeFilm" title="Quitar">✕</button>
          </div>

          <p class="mb-2" style="color:#fff066; font-size:0.82rem; font-weight:700;">
            2. ¿Qué quieres compartir?
          </p>

          <textarea id="postText" placeholder="Cuéntale a tus homies..." class="mb-3"></textarea>

          <div class="d-flex justify-content-end">
            <button class="post-submit-btn" id="postBtn" disabled>Postear</button>
          </div>
        </div>

        <!-- POSTS -->
        <div id="feed"></div>

      </div>

      <!-- SIDEBAR -->
      <div class="sidebar-col" style="width:290px; flex-shrink:0;">
        <div class="sidebar">

          <div class="sidebar-header">
            <span>RECOMENDACIONES</span>
            <a href="#">Ver todas</a>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <div class="cover c1"><img src="https://m.media-amazon.com/images/M/MV5BOWU2NjY5NWQtMjdkZi00ODJlLThkZTAtMzFlYmJmMGE2NjZkXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="Stranger Things 5" width="140px"></div>
            </div>
            <div class="col-6">
              <div class="cover c2"><img src="https://m.media-amazon.com/images/M/MV5BZGJkZTEzNmUtYmY4NS00OTU1LTk3YTMtNmY4MzY4YmMxNWE5XkEyXkFqcGc@._V1_.jpg" alt="The Return of The Living Dead" width="140px"></div>
            </div>
            <div class="col-6">
              <div class="cover c3"><img src="https://m.media-amazon.com/images/M/MV5BMTc0MzgzNTI3N15BMl5BanBnXkFtZTcwNDk3MDIzMQ@@._V1_FMjpg_UX1000_.jpg" alt="Hard Candy" width="140px"></div>
            </div>
            <div class="col-6">
              <div class="cover c4"><img src="https://m.media-amazon.com/images/M/MV5BMjI5OTk3Mjg4MV5BMl5BanBnXkFtZTcwNzQ2NTQxNw@@._V1_FMjpg_UX1000_.jpg" alt="The Sleeping Beauty" width="140px"></div>
            </div>
          </div>

          <div class="sidebar-header">
            <span>LANZAMIENTOS</span>
            <a href="#">Ver todas</a>
          </div>
          <div class="row g-2">
            <div class="col-4">
              <div class="cover c5"><img src="https://m.media-amazon.com/images/M/MV5BZmM3ZDU3ODItZmY5Yi00OTQ2LWE5OTctZTA5NDBhMWJkOGY3XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="Devil Wears Prada 2" width="80px"></div>
            </div>
            <div class="col-4">
              <div class="cover c6"><img src="https://m.media-amazon.com/images/M/MV5BNzllNmRlN2EtMDQyOC00ODJjLTg4OWQtZDNmNGU3YzlkNjc1XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="Michael" width="80px"></div>
            </div>
            <div class="col-4">
              <div class="cover c7"><img src="https://m.media-amazon.com/images/M/MV5BZTI1YTBiNmEtYWUxZi00YzFkLWIzNjMtMmZjMmY2NzM0ZWMzXkEyXkFqcGc@._V1_.jpg" alt="Toy Story 5" width="80px"></div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- BOTTOM NAV MOBILE -->
  <nav class="bottom-nav">
    <div class="inner">
      <button class="bottom-nav-btn active">
        <span><img src="../img/trending.webp" alt="Trending" width="50px"></span>
        <span class="bottom-nav-label">Trending</span>
      </button>
      <button class="bottom-nav-btn">
        <span><img src="../img/myhomies.webp" alt="Mis Homies" width="70px"></span>
        <span class="bottom-nav-label">Mis Homies</span>
      </button>
      <button class="bottom-nav-btn">
        <span><img src="../img/clapperboard.webp" alt="Estrenos" width="40px"></span>
        <span class="bottom-nav-label">Estrenos</span>
      </button>
      <button class="bottom-nav-btn">
        <span><img src="../img/home_profileicon(noglow).webp" alt="Perfil" width="40px"></span>
        <span class="bottom-nav-label">Perfil</span>
      </button>
    </div>
  </nav>

  <!-- SockJS y Stomp primero (globales) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

  <!-- Módulos -->
  <script type="module" src="../src/JS/script.js"></script>
  <script type="module" src="../src/JS/webSocket.js"></script>

  <!-- Listener del evento WebSocket -->
  <script>
    document.addEventListener("nuevaCalificacion", function(e) {
      const calificacion = e.detail;
      console.log("Mostrando:", calificacion.contenido.titulo);
    });

    function cerrarSesion() {
      localStorage.removeItem("token");
      window.location.href = "../html/login.html";
    }
  </script>

</body>
</html>
