
# Activa el perfil según quién corra (cambiar a "Javi" si es Javiera)
spring.profiles.active=Diego
#spring.profiles.active=Javi



spring.application.name=peliculas

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del Servidor Backend
server.port=8080

# API de Series y Películas (TMDB)
tmdb.base-url=https://api.themoviedb.org/3
tmdb.image-base-url=https://image.tmdb.org/t/p/w500
tmdb.token=${TMDB_TOKEN}

# API de Anime (Jikan)
jikan.base-url=https://api.jikan.moe/v4

# ===============================
# CORS Configuration
# ===============================
# AJUSTADO: Se añaden las URLs de Live Server (puerto 5500) separados por comas
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5500,http://localhost:5500

# ===============================
# JWT Security
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000